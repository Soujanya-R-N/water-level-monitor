<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Water Level Monitoring</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="card">

<h1>Water Tank Monitor</h1>

<div class="sensor">
Bottom Sensor : <span id="bottom">--</span>
</div>

<div class="sensor">
Top Sensor : <span id="top">--</span>
</div>

<div class="sensor">
TDS Value : <span id="tds">--</span> ppm
</div>

<div class="sensor">
Motor : <span id="motor">OFF</span>
</div>

<button onclick="motorON()">Motor ON</button>
<button onclick="motorOFF()">Motor OFF</button>

</div>

<script src="script.js"></script>

</body>
</html>
